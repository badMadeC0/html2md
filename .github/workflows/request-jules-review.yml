name: Request Jules Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Request review from Jules bot
        # Requesting a Jules review is best-effort; do not block PR checks if
        # the workflow token cannot request pull request reviewers (common for forks).
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          api_url = os.environ["GITHUB_API_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]

          reviewer = "google-labs-jules[bot]"
          request = urllib.request.Request(
              url=(
                  f"{api_url}/repos/{repo}/pulls/{pr_number}"
                  "/requested_reviewers"
              ),
              data=json.dumps({"reviewers": [reviewer]}).encode("utf-8"),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  print(
                      f"Requested review from @{reviewer} on PR #{pr_number} "
                      f"(status {response.status})"
                  )
          except urllib.error.HTTPError as error:
              error_body = error.read().decode("utf-8")
              print(
                  f"Could not request review from @{reviewer}; "
                  "continuing without failing the workflow."
              )
              print(f"HTTP {error.code}: {error_body}")
              print("Ensure the workflow token can request pull request reviewers.")
          except urllib.error.URLError as error:
              print(
                  f"Could not request review from @{reviewer} due to a "
                  "network error; continuing without failing the workflow."
              )
              print(f"Error: {error}")
          PY
