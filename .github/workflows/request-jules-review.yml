name: Request Jules Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    # Skip forks: the token typically can't write comments there
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Request review from Jules bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          api_url = os.environ["GITHUB_API_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]
          comment_body = (
              "@google-labs-jules please review this pull request.\n\n"
              "<!-- html2md-jules-review-request -->"
          )
          legacy_comment_body = "@google-labs-jules please review this pull request."
          marker = "html2md-jules-review-request"
          comments_url = f"{api_url}/repos/{repo}/issues/{pr_number}/comments"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
          }

          def request_json(url):
              request = urllib.request.Request(url=url, headers=headers, method="GET")
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          def jules_request_already_posted():
              page = 1
              while True:
                  comments = request_json(f"{comments_url}?per_page=100&page={page}")
                  for comment in comments:
                      body = comment.get("body", "")
                      if marker in body or body.strip() == legacy_comment_body:
                          return True
                  if len(comments) < 100:
                      return False
                  page += 1

          try:
              if jules_request_already_posted():
                  print(
                      "Review request for @google-labs-jules already exists on "
                      f"PR #{pr_number}; skipping duplicate comment."
                  )
                  sys.exit(0)
          except urllib.error.HTTPError as error:
              error_body = error.read().decode("utf-8")
              print(
                  "Could not check existing @google-labs-jules comments; "
                  "continuing without failing the workflow."
              )
              print(f"HTTP {error.code}: {error_body}")
              sys.exit(0)
          except urllib.error.URLError as error:
              print(
                  "Could not check existing @google-labs-jules comments due to a "
                  "network error; continuing without failing the workflow."
              )
              print(f"Error: {error}")
              sys.exit(0)

          request = urllib.request.Request(
              url=comments_url,
              data=json.dumps({"body": comment_body}).encode("utf-8"),
              headers={**headers, "Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(request) as response:
                  print(
                      "Requested review from @google-labs-jules via comment on "
                      f"PR #{pr_number} (status {response.status})"
                  )
          except urllib.error.HTTPError as error:
              if error.code == 403:
                  print("Skipping: token cannot comment in this PR context (HTTP 403).")
                  sys.exit(0)
              error_body = error.read().decode("utf-8")
              print(
                  "Could not request review from @google-labs-jules; "
                  "continuing without failing the workflow."
              )
              print(f"HTTP {error.code}: {error_body}")
              print("Ensure the workflow token has permission to comment.")
          except urllib.error.URLError as error:
              print(
                  "Could not request review from @google-labs-jules due to a "
                  "network error; continuing without failing the workflow."
              )
              print(f"Error: {error}")
          PY
