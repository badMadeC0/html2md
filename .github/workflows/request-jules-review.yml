name: Request Jules Review

on:
  pull_request:
    types: [opened, reopened, synchronize]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@gemini-code-assist')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@gemini-code-assist'))
    steps:
      - name: Request review from Jules bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          api_url = os.environ["GITHUB_API_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]

          request = urllib.request.Request(
              url=f"{api_url}/repos/{repo}/issues/{pr_number}/comments",
              data=json.dumps(
                  {"body": "@google-labs-jules please review this pull request."}
              ).encode("utf-8"),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request) as response:
                  print(
                      "Requested review from @google-labs-jules via comment on "
                      f"PR #{pr_number} (status {response.status})"
                  )
          except urllib.error.HTTPError as error:
              print(f"Could not request review: {error.read().decode('utf-8')}")
              print("Ensure the workflow token has permission to comment.")
              sys.exit(1)
          PY
