name: Request Jules Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    # Skip forks: the token typically can't write comments there
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Request review from Jules bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          api_url = os.environ["GITHUB_API_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]

          request = urllib.request.Request(
              url=f"{api_url}/repos/{repo}/issues/{pr_number}/comments",
              data=json.dumps(
                  {"body": "@google-labs-jules please review this pull request."}
              ).encode("utf-8"),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request) as response:
                  print(
                      "Requested review from @google-labs-jules via comment on "
                      f"PR #{pr_number} (status {response.status})"
                  )
          except urllib.error.HTTPError as error:
              body = error.read().decode("utf-8")
              print(f"Could not request review: {body}")
              if error.code == 403:
                  print("Skipping: token cannot comment in this PR context.")
                  sys.exit(0)
              raise
          PY
