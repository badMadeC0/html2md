name: Request Jules Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Request review from Jules bot
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '@google-labs-jules please review this pull request.'
              });
              console.log(`Requested review from @google-labs-jules via comment on PR #${pr.number}`);
            } catch (error) {
              console.log(`Could not request review: ${error.message}`);
              console.log('Ensure the workflow token has permissions to comment.');
            }
