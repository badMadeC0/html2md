name: Request Jules Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  issues: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Request review from Jules bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          api_url = os.environ["GITHUB_API_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          token = os.environ["GITHUB_TOKEN"]

          comment_body = "@google-labs-jules please review this pull request."
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
          }

          def urlopen_json(request):
              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read().decode("utf-8")), response.status

          comments_url = f"{api_url}/repos/{repo}/issues/{pr_number}/comments"

          try:
              page = 1
              while True:
                  check_request = urllib.request.Request(
                      url=f"{comments_url}?per_page=100&page={page}",
                      headers=headers,
                      method="GET",
                  )
                  comments, status = urlopen_json(check_request)
                  if any(comment.get("body") == comment_body for comment in comments):
                      print(
                          "Jules review request comment already exists on "
                          f"PR #{pr_number}; skipping duplicate (status {status})."
                      )
                      raise SystemExit(0)
                  if len(comments) < 100:
                      break
                  page += 1

              request = urllib.request.Request(
                  url=comments_url,
                  data=json.dumps({"body": comment_body}).encode("utf-8"),
                  headers=headers,
                  method="POST",
              )

              with urllib.request.urlopen(request) as response:
                  print(
                      "Requested review from @google-labs-jules via comment on "
                      f"PR #{pr_number} (status {response.status})"
                  )
          except urllib.error.HTTPError as error:
              print(f"Could not request review: {error.read().decode('utf-8')}")
              print(
                  "Review request comment was skipped; this is expected when "
                  "the workflow token is read-only (for example, pull requests "
                  "from forks or Dependabot)."
              )
          PY
