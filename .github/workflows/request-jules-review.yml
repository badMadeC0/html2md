name: Request Jules Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    # Skip forks: the token typically can't write comments there
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Request review from Jules bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          api_url = os.environ["GITHUB_API_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]
          pr_number = os.environ["PR_NUMBER"]
          head_sha = os.environ["PR_HEAD_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          comments_url = f"{api_url}/repos/{repo}/issues/{pr_number}/comments"
          marker = f"<!-- jules-review-request: {head_sha} -->"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def request_json(url: str) -> list[dict]:
              request = urllib.request.Request(url=url, headers=headers, method="GET")
              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read().decode("utf-8"))

          try:
              for page in range(1, 101):
                  url = comments_url + "?" + urllib.parse.urlencode(
                      {"per_page": 100, "page": page}
                  )
                  comments = request_json(url)
                  if any(marker in comment.get("body", "") for comment in comments):
                      print(
                          "Skipping: @google-labs-jules was already requested for "
                          f"PR #{pr_number} at head {head_sha}."
                      )
                      sys.exit(0)
                  if len(comments) < 100:
                      break

              body = (
                  "@google-labs-jules please review this pull request.\n\n"
                  f"{marker}"
              )
              post_headers = headers | {"Content-Type": "application/json"}
              request = urllib.request.Request(
                  url=comments_url,
                  data=json.dumps({"body": body}).encode("utf-8"),
                  headers=post_headers,
                  method="POST",
              )
              with urllib.request.urlopen(request) as response:
                  print(
                      "Requested review from @google-labs-jules via comment on "
                      f"PR #{pr_number} at head {head_sha} (status {response.status})"
                  )
          except urllib.error.HTTPError as error:
              if error.code == 403:
                  print("Skipping: token cannot comment in this PR context (HTTP 403).")
                  sys.exit(0)
              body = error.read().decode("utf-8")
              print(f"Could not request review: {body}")
              raise
          PY
