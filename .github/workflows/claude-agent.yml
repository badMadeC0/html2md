name: claude-agent

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  run-claude-agent:
    # Restrict to PR-related comments for security.
    if: >
      github.event_name == 'workflow_dispatch' ||
      ((github.event_name == 'issue_comment' && github.event.issue.pull_request) || github.event_name == 'pull_request_review_comment') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR') &&
       (contains(github.event.comment.body, '@claude-agent') ||
        contains(github.event.comment.body, '@claude[bot]') ||
        contains(github.event.comment.body, '@codex[agent]')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: anthropics/claude-code-action@7e002f01d5b4d1b510ebbd44a1a0c0acbf339d4e # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
