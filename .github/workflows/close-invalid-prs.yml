name: Close Invalid PRs

on:
  push:
    branches:
      - 'claude/review-invalid-prs-*'

permissions:
  pull-requests: write

jobs:
  close-invalid-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Close invalid PRs
        uses: actions/github-script@v7
        with:
          script: |
            const invalidPRs = [
              { number: 319, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 314, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 312, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 307, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 306, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 301, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 288, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 287, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 194, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 193, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 189, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 154, reason: "Closing all remaining open PRs per repository owner request." },
              { number: 144, reason: "Closing all remaining open PRs per repository owner request." }
            ];

            for (const pr of invalidPRs) {
              try {
                // Add comment explaining why
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `Closing as invalid: ${pr.reason}`
                });

                // Close the PR
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: 'closed'
                });

                console.log(`Closed PR #${pr.number}`);
              } catch (error) {
                console.log(`Failed to close PR #${pr.number}: ${error.message}`);
              }
            }
