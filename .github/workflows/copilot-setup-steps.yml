name: copilot-setup-steps

on:
  workflow_call:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COPILOT_USE_SESSIONS: "false"
      COPILOT_MEMORY_ENABLED: "false"
      DISABLE_MEMORY: "true"
      SKIP_MEMORY_FETCH: "true"
    steps:
      - name: Prepare environment for Copilot agents
        run: |
          echo "Copilot setup applied: memory fetch disabled."
          # Pre-fetch Gemini extension metadata while firewall is disabled
          curl -s https://api.github.com/repos/gemini-cli-extensions/code-review/commits > /dev/null
