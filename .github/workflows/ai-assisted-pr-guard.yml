name: ai-assisted-pr-guard

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  pull-requests: read
  contents: read

jobs:
  check-ai-assisted-marker:
    # Enforce [AI-Assisted] title marker and transcript URL requirements.
    name: Verify chat link for [AI-Assisted] PRs
    runs-on: ubuntu-latest
    steps:
      - name: Inspect PR title and body
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          set -euo pipefail
          echo "PR title: $PR_TITLE"

          body="${PR_BODY:-}"
          transcript_url_pattern='(^|[[:space:]<>(])https?://(claude\.ai/(chat|share)/[^/?[:space:]]|claude\.ai/code/session_[^/?[:space:]]|cursor\.com/share/[^/?[:space:]]|chatgpt\.com/codex/[^/?[:space:]]|jules\.google\.com/task/[^/?[:space:]])'

          if [[ "$PR_TITLE" != \[AI-Assisted\]* ]]; then
            if printf '%s' "$body" | grep -qF '<CLAUDE_CHAT_URL>' || printf '%s' "$body" | grep -Eqi "$transcript_url_pattern"; then
              echo "::error::PR appears to include AI-assistance evidence but the title does not start with [AI-Assisted]. Add the marker or remove the AI-assistance evidence."
              exit 1
            fi

            echo "OK: Untagged PR has no AI-assistance evidence; skipping transcript checks."
            exit 0
          fi

          # Body must reference an agent transcript URL for PRs explicitly
          # marked as AI-assisted. Accepted hosts and required path prefixes:
          #   claude.ai/(chat|share)/<id>
          #   claude.ai/code/session_<id>
          #   cursor.com/share/<id>
          #   chatgpt.com/codex/<...>
          #   jules.google.com/task/<id>
          # The placeholder <CLAUDE_CHAT_URL> is acceptable in DRAFT PRs only.
          # Ready/non-draft PRs fail if the placeholder is anywhere in the
          # body — even alongside a real URL — because the baseline says the
          # placeholder must be replaced before a PR is ready.
          # Step 1: reject the placeholder first for non-draft PRs. This must
          # come before the real-URL check so a PR with both a real URL AND a
          # leftover placeholder still fails (rather than the real URL match
          # short-circuiting the placeholder check).
          if printf '%s' "$body" | grep -qF '<CLAUDE_CHAT_URL>'; then
            if [[ "${PR_DRAFT:-false}" == "true" ]]; then
              echo "::warning::Draft PR body still contains the <CLAUDE_CHAT_URL> placeholder. Replace it with the real chat URL before marking ready for review."
              # Don't exit yet — fall through so we still validate that the
              # draft body has a real URL (drafts can have both during edits).
            else
              echo "::error::PR body still contains the <CLAUDE_CHAT_URL> placeholder. Replace it with the real chat URL before marking ready for review or merging."
              exit 1
            fi
          fi

          # Step 2: require a real transcript URL with a known share/chat
          # path prefix per provider.
          # The leading-boundary group `(^|[[:space:]<>(])` requires the URL
          # to start at a real link boundary so that:
          #   - bare hosts like https://claude.ai or https://claude.ai/settings
          #     and generic provider pages like https://cursor.com/pricing
          #     don't satisfy the check (they don't match a transcript prefix)
          #   - lookalikes like https://claude.ai.evil.example/foo are rejected
          #   - URL-in-URL embeddings like
          #     https://example.test/redirect/https://claude.ai/chat/fake do
          #     not match (the inner `https?://` is preceded by `/` not a
          #     boundary char).
          # Each accepted provider path includes at least one non-slash,
          # non-`?`, non-whitespace character after its required prefix so
          # empty transcript paths don't pass.
          if printf '%s' "$body" | grep -Eqi "$transcript_url_pattern"; then
            # If a draft PR has the placeholder AND a real URL, the warning
            # above is what surfaces; this exit 0 keeps the check green so
            # drafts can iterate.
            echo "OK: PR body contains an agent transcript URL."
            exit 0
          fi

          # No real transcript URL found, and we've already exited 1 if a
          # non-draft body had the placeholder. Anything reaching here is an
          # AI-assisted PR with no transcript link and no placeholder.
          echo "::error::PR title is tagged [AI-Assisted] but the body does not include an originating agent transcript URL (claude.ai/chat, claude.ai/share, claude.ai/code/session_, cursor.com/share, chatgpt.com/codex, jules.google.com/task). Add the URL or remove the tag."
          exit 1
