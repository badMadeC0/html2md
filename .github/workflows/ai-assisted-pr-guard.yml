name: ai-assisted-pr-guard

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  pull-requests: read
  contents: read

jobs:
  check-ai-assisted-marker:
    name: Verify [AI-Assisted] tag and Claude chat link
    runs-on: ubuntu-latest
    steps:
      - name: Inspect PR title and body
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          set -euo pipefail
          echo "PR title: $PR_TITLE"

          if [[ "$PR_TITLE" != \[AI-Assisted\]* ]]; then
            echo "::error::PR title must start with [AI-Assisted]."
            exit 1
          fi

          # Body must reference a Claude chat URL or other agent transcript.
          # Accept claude.ai links, cursor.com, codex, jules.google, or the
          # literal placeholder <CLAUDE_CHAT_URL> for drafts only (warn).
          # Ready/non-draft PRs fail until the placeholder is replaced.
          body="${PR_BODY:-}"

          # Require a real chat/share path after each accepted host:
          #   claude.ai/<path>, cursor.com/<path>, chatgpt.com/codex/<path>,
          #   jules.google.com/<path>.
          # This rejects:
          #   - bare hosts like https://claude.ai, https://claude.ai?x=1,
          #     or https://claude.ai/?x=1 (which are not transcript links)
          #   - lookalikes like https://claude.ai.evil.example/foo
          # The trailing class `[^/?[:space:]]` requires at least one
          # non-slash, non-`?`, non-whitespace path character so an empty `/`
          # or a query-only root URL doesn't pass.
          if printf '%s' "$body" | grep -Eqi 'https?://(claude\.ai|cursor\.com|chatgpt\.com/codex|jules\.google\.com)/[^/?[:space:]]'; then
            echo "OK: PR body contains an agent chat URL."
            exit 0
          fi

          if printf '%s' "$body" | grep -qF '<CLAUDE_CHAT_URL>'; then
            if [[ "${PR_DRAFT:-false}" == "true" ]]; then
              echo "::warning::Draft PR body still contains the <CLAUDE_CHAT_URL> placeholder. Replace it with the real chat URL before marking ready for review."
              exit 0
            fi

            echo "::error::PR body still contains the <CLAUDE_CHAT_URL> placeholder. Replace it with the real chat URL before marking ready for review or merging."
            exit 1
          fi

          echo "::error::PR title is tagged [AI-Assisted] but the body does not include a Claude chat URL (or accepted alternative). Add the URL or remove the tag."
          exit 1
