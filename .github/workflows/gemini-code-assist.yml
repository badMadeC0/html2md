name: Gemini Code Assist

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-code-assist:
    runs-on: ubuntu-latest
    # Gemini uses secret-backed authentication and writes PR reviews/comments,
    # so skip forked pull_request runs where tokens are read-only and secrets are unavailable.
    if: >
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.fork == false) ||
      ((github.event_name == 'pull_request_review_comment' ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request)) &&
       contains(github.event.comment.body, '@gemini-code-assist') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_CLI_TRUST_WORKSPACE: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gemini Code Assist
        if: env.GEMINI_API_KEY != ''
        continue-on-error: true
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489 # v0.1.22
        with:
          gemini_api_key: ${{ env.GEMINI_API_KEY }}
