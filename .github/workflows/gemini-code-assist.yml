name: Gemini Code Assist

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  gemini-code-assist:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@gemini-code-assist')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@gemini-code-assist'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gemini Code Assist
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          PR_URL: ${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number || github.event.issue.number }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
          settings: |
            {
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${{ github.token }}"
                  }
                }
              }
            }
          prompt: |
            /pr-code-review
            Repository: ${{ github.repository }}
            Pull Request Number: ${{ github.event.pull_request.number || github.event.issue.number }}
            Pull Request URL: ${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number || github.event.issue.number }}
          extensions: |
            ["https://github.com/gemini-cli-extensions/code-review"]
