name: Gemini Code Assist

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: gemini-code-assist-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review_comment' &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR') &&
       contains(github.event.comment.body, '@gemini-code-assist')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR') &&
       contains(github.event.comment.body, '@gemini-code-assist'))
    outputs:
      enabled: ${{ steps.gate.outputs.enabled }}
    steps:
      - name: Check for Gemini API key
        id: gate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Gemini Code Assist: GEMINI_API_KEY secret is not configured."
          fi

  gemini-code-assist:
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Strip PR-supplied Gemini config
        # Project-local .gemini/commands/*.toml shadow extension commands
        # in Gemini CLI's loader, so a PR could plant a pr-code-review.toml
        # that hijacks /pr-code-review. We don't ship .gemini/ in the repo,
        # so wiping it is safe and removes the attack surface.
        run: rm -rf .gemini
      - name: Vendor the code-review extension as a project-local extension
        # gemini-cli-extensions/code-review publishes no GitHub releases or
        # tags, so `gemini extensions install <url>@<ref>` (the run-gemini-cli
        # default) always 404s on the release lookup and then drops into an
        # interactive "install via git clone instead?" consent prompt that
        # CI can't answer reliably. Cloning into .gemini/extensions/<name>/
        # makes Gemini CLI load it as a trusted project-local extension at
        # startup — no release lookup, no consent prompt, deterministic ref.
        env:
          # Pin to a known-good main HEAD. Bump intentionally; do not pin to
          # a moving branch ref (defeats supply-chain auditability).
          EXT_SHA: dd1a10d2c9d07b2ebade866590fdfa59cd8f9d04
        run: |
          set -euo pipefail
          mkdir -p .gemini/extensions
          git clone --depth 1 https://github.com/gemini-cli-extensions/code-review.git \
            .gemini/extensions/code-review
          cd .gemini/extensions/code-review
          git fetch --depth 1 origin "$EXT_SHA"
          git checkout "$EXT_SHA"
          # Sanity-check the extension manifest before we hand control to
          # the CLI; if the upstream repo restructures, we want a clear
          # failure here rather than an opaque "command not found" later.
          test -f gemini-extension.json \
            || { echo "::error::gemini-extension.json missing in pinned ref $EXT_SHA"; exit 1; }
      - name: Gemini Code Assist
        id: gemini
        continue-on-error: true
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489 # v0.1.22
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Consumed by the code-review extension's /pr-code-review prompt
          # template via $REPOSITORY and $PULL_REQUEST_NUMBER expansions.
          REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_cli_version: "0.41.2"
          # Resolves the PR number across all three supported triggers:
          # pull_request, pull_request_review_comment, and issue_comment.
          # The first two populate github.event.pull_request.number; the
          # last populates github.event.issue.number.
          github_pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server@sha256:a1d43076a36638ee24520fd6e83c3905ae41bc9850179081df1de2ba3a7afae0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "read_file",
                  "read_many_files",
                  "list_directory",
                  "glob",
                  "grep_search"
                ]
              }
            }
          # The code-review extension is vendored above into
          # .gemini/extensions/code-review/, so we deliberately pass no
          # `extensions:` input here — that avoids the broken release-tag
          # install path in run-gemini-cli for an extension repo that has
          # no releases or tags.
          prompt: "/pr-code-review"
      - name: Note Gemini API quota exhaustion
        if: >
          steps.gemini.outcome == 'failure' &&
          (contains(steps.gemini.outputs.gemini_errors, 'TerminalQuotaError') ||
           contains(steps.gemini.outputs.gemini_errors, 'exhausted your daily quota') ||
           contains(steps.gemini.outputs.gemini_errors, 'Quota exceeded'))
        run: |
          echo "::notice title=Gemini quota exhausted::Skipping Gemini Code Assist because the configured Gemini API key has exhausted its quota."
          {
            echo "### Gemini Code Assist"
            echo
            echo "Skipped because the configured Gemini API key has exhausted its Gemini API quota."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Note other Gemini failures
        if: >
          steps.gemini.outcome == 'failure' &&
          !(contains(steps.gemini.outputs.gemini_errors, 'TerminalQuotaError') ||
            contains(steps.gemini.outputs.gemini_errors, 'exhausted your daily quota') ||
            contains(steps.gemini.outputs.gemini_errors, 'Quota exceeded'))
        run: |
          echo "::warning title=Gemini Code Assist failed::Gemini CLI failed, but this workflow is non-blocking."
