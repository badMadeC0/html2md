name: Gemini Code Assist

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-code-assist:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository) ||
      ((github.event_name == 'pull_request_review_comment' ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request)) &&
        (github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'COLLABORATOR') &&
        (contains(github.event.comment.body, '@gemini-cli') ||
         contains(github.event.comment.body, '@gemini-code-assist')))
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_CLI_TRUST_WORKSPACE: 'true'
    steps:
      - name: Resolve PR head SHA
        id: pr_head
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            let pr;
            if (context.eventName === "pull_request") {
              pr = context.payload.pull_request;
            } else if (context.eventName === "pull_request_review_comment") {
              pr = context.payload.pull_request;
            } else if (context.eventName === "issue_comment" && context.payload.issue?.pull_request) {
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number,
              });
              pr = response.data;
            }

            if (!pr) {
              core.setFailed("Could not resolve pull request from event payload. This workflow requires pull_request, pull_request_review_comment, or issue_comment on a pull request.");
              return;
            }

            const sameRepo = pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("is_same_repo", String(sameRepo));
            core.setOutput("number", String(pr.number));

      - uses: actions/checkout@v6
        if: github.event_name == 'workflow_dispatch' || steps.pr_head.outputs.is_same_repo == 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || steps.pr_head.outputs.head_sha }}

      - name: Build Gemini prompt
        id: gemini_prompt
        if: env.GEMINI_API_KEY != '' && (github.event_name == 'workflow_dispatch' || steps.pr_head.outputs.is_same_repo == 'true')
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login || github.actor }}
          COMMENT_URL: ${{ github.event.comment.html_url || github.server_url }}
          PR_NUMBER: ${{ steps.pr_head.outputs.number || github.event.pull_request.number || github.event.issue.number || '' }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [[ "$COMMENT_BODY" == *"/review"* ]]; then
            echo "prompt=/pr-code-review" >> "$GITHUB_OUTPUT"
          else
            delimiter="gemini_prompt_$(uuidgen)"
            pr_context="manual workflow_dispatch"
            if [[ -n "$PR_NUMBER" ]]; then
              pr_context="#${PR_NUMBER}"
            fi
            default_body="Manual workflow_dispatch run: review the checked-out repository and summarize any actionable findings."
            {
              echo "prompt<<${delimiter}"
              printf 'You are Gemini Code Assist running in a GitHub Actions workflow for %s.\n\n' "${REPOSITORY}"
              printf 'Event: %s\n' "${EVENT_NAME}"
              printf 'Pull request: %s\n' "${pr_context}"
              printf 'Comment author: %s\n' "${COMMENT_AUTHOR}"
              printf 'Comment URL: %s\n\n' "${COMMENT_URL}"
              printf 'Respond to the pull request by carrying out the request in the triggering comment.\n'
              printf 'Use the GitHub CLI or GitHub API when you need pull request details, diffs, or to post feedback.\n\n'
              printf 'Triggering comment:\n'
              printf '%s\n' "${COMMENT_BODY:-${default_body}}"
              echo "${delimiter}"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Gemini Code Assist
        if: env.GEMINI_API_KEY != '' && (github.event_name == 'workflow_dispatch' || steps.pr_head.outputs.is_same_repo == 'true')
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        with:
          gemini_api_key: ${{ env.GEMINI_API_KEY }}
          github_pr_number: ${{ steps.pr_head.outputs.number || github.event.pull_request.number || github.event.issue.number || '' }}
          settings: |
            {
              "model": {
                "maxSessionTurns": 25
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          prompt: ${{ steps.gemini_prompt.outputs.prompt }}
