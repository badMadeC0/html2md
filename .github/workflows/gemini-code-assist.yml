name: Gemini Code Assist

on:
  pull_request:
  pull_request_review_comment:
  issue_comment:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-code-assist:
    runs-on: ubuntu-latest
    # NOTE: do not add `secrets.X != ''` to this job-level `if:`. GitHub
    # Actions rejects `secrets` references at job-level `if:` as a workflow
    # validation error (the run shows `name: <file path>` instead of the
    # workflow's `name:` field, with a 0s "workflow file issue" failure).
    # See PR #614 history (87a8113, 24264c7, 0c4f451 all hit this).
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@gemini-code-assist')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@gemini-code-assist'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gemini Code Assist
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GitHub-hosted runners are ephemeral and isolated; mark the
          # checked-out workspace as trusted so the CLI proceeds non-
          # interactively. Without this the action fails with:
          # "Gemini CLI is not running in a trusted directory."
          GEMINI_CLI_TRUST_WORKSPACE: "true"
