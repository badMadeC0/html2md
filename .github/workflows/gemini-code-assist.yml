name: Gemini Code Assist

on:
  pull_request:
  # Restrict comment events to `created`; otherwise editing an old comment
  # that contains "@gemini-code-assist" re-triggers a (paid) Gemini run.
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-code-assist:
    runs-on: ubuntu-latest
    # NOTE: do not put `secrets.X != ''` in this job-level `if:`. GitHub
    # Actions rejects `secrets` references at job-level `if:` as a workflow
    # validation error (the run shows `name: <file path>` instead of the
    # workflow's `name:` field, with a 0s "workflow file issue" failure).
    # See PR #614 history (87a8113, 24264c7, 0c4f451 all hit this).
    # Instead, expose the secret via the job-level `env:` block below and
    # gate the Gemini step on `env.GEMINI_API_KEY != ''`.
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository) ||
      ((github.event_name == 'pull_request_review_comment' ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request)) &&
       contains(github.event.comment.body, '@gemini-code-assist') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # GitHub-hosted runners are ephemeral and isolated; mark the checked-out
      # workspace as trusted so the CLI proceeds non-interactively. Without
      # this the action fails with: "Gemini CLI is not running in a trusted
      # directory."
      GEMINI_CLI_TRUST_WORKSPACE: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gemini Code Assist
        # Skip cleanly when the API key isn't configured (env-based guard
        # avoids the job-level `if:` validation issue noted above).
        if: env.GEMINI_API_KEY != ''
        # `continue-on-error: true` so transient Gemini issues (quota,
        # outages) don't block the PR. The check still reports its
        # outcome, but the job step is treated as success for the
        # workflow's overall conclusion.
        continue-on-error: true
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489 # v0.1.22
        with:
          gemini_api_key: ${{ env.GEMINI_API_KEY }}
