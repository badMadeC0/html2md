name: Gemini Code Assist

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-code-assist:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository) ||
      ((github.event_name == 'pull_request_review_comment' ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request)) &&
       contains(github.event.comment.body, '@gemini-code-assist') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_CLI_TRUST_WORKSPACE: "true"
      GOOGLE_GENAI_USE_GCA: ${{ vars.GOOGLE_GENAI_USE_GCA }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gemini Code Assist
        if: env.GEMINI_API_KEY != '' || env.GOOGLE_GENAI_USE_GCA == 'true'
        continue-on-error: true
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489 # v0.1.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        with:
          gemini_api_key: ${{ env.GEMINI_API_KEY }}
          use_gemini_code_assist: ${{ env.GOOGLE_GENAI_USE_GCA }}
          github_pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
          # Pin to commit dd1a10d2c9d07b2ebade866590fdfa59cd8f9d04 (2026-03-10).
          # Note: the run-gemini-cli action API passes each entry directly to
          # `gemini extensions install` without a --ref flag, so immutable
          # pinning via the extensions input is not yet possible. Update this
          # SHA whenever the extension is intentionally upgraded.
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          settings: |
            {
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server@sha256:a1d43076a36638ee24520fd6e83c3905ae41bc9850179081df1de2ba3a7afae0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          prompt: /pr-code-review
