name: Self-heal (auto-fix & PR)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  self-heal:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.head_repository.fork == false &&
        (
          github.event.workflow_run.event == 'push' ||
          github.event.workflow_run.event == 'workflow_dispatch'
        )
      )
    permissions:
      contents: write
      pull-requests: write
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout trusted repair driver
        uses: actions/checkout@v4
        with:
          path: self-heal-driver
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Checkout failed ref
        uses: actions/checkout@v4
        with:
          path: worktree
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        working-directory: worktree
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e . pytest black

      - name: Run healthcheck (pre-repair)
        continue-on-error: true
        working-directory: worktree
        run: |
          set -euo pipefail
          node ../self-heal-driver/scripts/healthcheck.mjs | tee ../selfheal-pre.txt

      - name: Attempt self-heal repairs
        working-directory: worktree
        run: |
          set -euo pipefail
          node ../self-heal-driver/scripts/self-heal.mjs | tee ../selfheal-repair.txt

      - name: Run healthcheck (post-repair)
        id: post
        continue-on-error: true
        working-directory: worktree
        run: |
          set -euo pipefail
          node ../self-heal-driver/scripts/healthcheck.mjs | tee ../selfheal-post.txt

      - name: Collect logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-logs
          path: |
            selfheal-pre.txt
            selfheal-repair.txt
            selfheal-post.txt

      - name: Create PR with fixes
        if: steps.post.outcome == 'success'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          path: worktree
          base: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
          commit-message: "chore: auto-fix Python formatting (black)"
          title: "🔧 Auto-healing fixes"
          body: |
            Automated fixes generated by the self-heal workflow.
            Please review the attached logs for details.
          labels: self-heal
          branch: auto-heal/fixes-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
