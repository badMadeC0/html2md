name: Self-heal (auto-fix & PR)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  self-heal:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e .
          pip install pytest black

      - name: Run healthcheck (pre-repair)
        continue-on-error: true
        run: python scripts/healthcheck.py > selfheal-pre.txt 2>&1

      - name: Attempt self-heal repairs
        run: python scripts/self-heal.py > selfheal-repair.txt 2>&1

      - name: Run healthcheck (post-repair)
        id: post
        continue-on-error: true
        run: python scripts/healthcheck.py > selfheal-post.txt 2>&1

      - name: Collect logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-logs
          path: |
            selfheal-pre.txt
            selfheal-repair.txt
            selfheal-post.txt

      - name: Create PR with fixes
        if: steps.post.outcome == 'success'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/self-heal
          commit-message: "chore(self-heal): automated repairs"
          title: "[AI-Assisted] 🤖 Self-healing: Automated repairs"
          body: |
            Automated repository repairs attempting to fix CI failure.

            Logs attached to workflow run artifacts.

            https://claude.ai/code/session_self_healing_workflow
          labels: self-heal
          signoff: true
