name: Self-heal (auto-fix & PR)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  self-heal:
    # workflow_run executes with elevated access to secrets/tokens. Only run repair
    # code for same-repository CI failures; forked PR code must never be checked
    # out or executed in this workflow.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      actions: read
    outputs:
      has_patch: ${{ steps.patch.outputs.has_patch }}
    steps:
      - name: Checkout trusted same-repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          repository: ${{ github.repository }}
          persist-credentials: false

      - name: Use Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e .
          pip install pytest black

      - name: Run healthcheck (pre-repair)
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/healthcheck.py | tee selfheal-pre.txt

      - name: Attempt self-heal repairs
        shell: bash
        run: |
          set -o pipefail
          python scripts/self-heal.py | tee selfheal-repair.txt

      - name: Run healthcheck (post-repair)
        id: post
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/healthcheck.py | tee selfheal-post.txt

      - name: Collect logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-logs
          path: |
            selfheal-pre.txt
            selfheal-repair.txt
            selfheal-post.txt

      - name: Create repair patch
        id: patch
        if: steps.post.outcome == 'success'
        shell: bash
        run: |
          git add -A -- . ':(exclude)selfheal-*.txt'
          if git diff --cached --quiet; then
            echo "No changes to commit. Exiting."
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --cached --binary > selfheal.patch
          echo "has_patch=true" >> "$GITHUB_OUTPUT"

      - name: Upload repair patch
        if: steps.patch.outputs.has_patch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-patch
          path: selfheal.patch

  create-pr:
    needs: self-heal
    if: needs.self-heal.outputs.has_patch == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repair target
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          repository: ${{ github.repository }}

      - name: Download repair patch
        uses: actions/download-artifact@v4
        with:
          name: selfheal-patch

      - name: Create PR with fixes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b self-heal-fixes-${{ github.run_id }}
          git apply --index selfheal.patch
          git commit -m "Auto-fix format/lint/type errors"
          git push origin self-heal-fixes-${{ github.run_id }}
          gh pr create --title "Auto-fix format/lint/type errors" --body "Automated fixes generated by self-heal workflow. Logs attached to workflow run." --base main --head self-heal-fixes-${{ github.run_id }} --label "self-heal"
