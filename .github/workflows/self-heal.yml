name: Self-heal (auto-fix & PR)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  self-heal:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.head_repository.fork == false &&
        (
          github.event.workflow_run.event == 'push' ||
          github.event.workflow_run.event == 'workflow_dispatch'
        )
      )
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e . pytest black

      - name: Run healthcheck (pre-repair)
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p "$RUNNER_TEMP/selfheal-logs"
          node scripts/healthcheck.mjs | tee "$RUNNER_TEMP/selfheal-logs/selfheal-pre.txt"

      - name: Attempt self-heal repairs
        run: |
          set -o pipefail
          node scripts/self-heal.mjs | tee "$RUNNER_TEMP/selfheal-logs/selfheal-repair.txt"

      - name: Run healthcheck (post-repair)
        id: post
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/healthcheck.mjs | tee "$RUNNER_TEMP/selfheal-logs/selfheal-post.txt"

      - name: Create repair patch
        if: steps.post.outcome == 'success'
        run: |
          set -euxo pipefail
          git diff --binary > "$RUNNER_TEMP/selfheal.patch"
          test -s "$RUNNER_TEMP/selfheal.patch"

      - name: Upload repair patch
        if: steps.post.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-patch
          path: ${{ runner.temp }}/selfheal.patch
          if-no-files-found: error

      - name: Collect logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-logs
          path: ${{ runner.temp }}/selfheal-logs/*.txt

  create-repair-pr:
    needs: self-heal
    if: needs.self-heal.result == 'success'
    permissions:
      contents: write
      pull-requests: write
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repaired source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Download repair patch
        uses: actions/download-artifact@v4
        with:
          name: selfheal-patch
          path: ${{ runner.temp }}/selfheal-patch

      - name: Apply repair patch
        run: |
          set -euxo pipefail
          git apply --binary "$RUNNER_TEMP/selfheal-patch/selfheal.patch"

      - name: Create PR with fixes
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          commit-message: "chore: auto-fix lint/format and lockfiles"
          title: "🔧 Auto-healing fixes"
          body: |
            Automated fixes generated by the self-heal workflow.
            Please review the attached logs for details.
          labels: self-heal
          branch: auto-heal/fixes
