name: Self-heal (auto-fix & PR)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  self-heal:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.head_repository.fork == false &&
        !startsWith(github.event.workflow_run.head_branch, 'auto-heal/') &&
        (
          github.event.workflow_run.event == 'push' ||
          github.event.workflow_run.event == 'workflow_dispatch'
        )
      )
    permissions:
      contents: read
      actions: read
    runs-on: windows-latest
    timeout-minutes: 25
    outputs:
      target-branch: ${{ steps.context.outputs.target-branch }}
      head-sha: ${{ steps.context.outputs.head-sha }}
    steps:
      - name: Determine repair context
        id: context
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
          HEAD_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          echo "target-branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          echo "head-sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout failed branch with read-only token
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.context.outputs.target-branch }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python deps
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e . pytest black

      - name: Run healthcheck (pre-repair)
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/healthcheck.mjs | tee "$RUNNER_TEMP/selfheal-pre.txt"

      - name: Attempt self-heal repairs
        shell: bash
        run: |
          set -o pipefail
          node scripts/self-heal.mjs | tee "$RUNNER_TEMP/selfheal-repair.txt"

      - name: Run healthcheck (post-repair)
        id: post
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/healthcheck.mjs | tee "$RUNNER_TEMP/selfheal-post.txt"

      - name: Collect logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-logs
          path: |
            ${{ runner.temp }}/selfheal-pre.txt
            ${{ runner.temp }}/selfheal-repair.txt
            ${{ runner.temp }}/selfheal-post.txt
          if-no-files-found: ignore

      - name: Create repair patch artifact
        if: steps.post.outcome == 'success'
        shell: bash
        run: |
          set -euxo pipefail
          git diff -- . > "$RUNNER_TEMP/selfheal-repair.patch"
          test -s "$RUNNER_TEMP/selfheal-repair.patch"

      - name: Upload repair patch
        if: steps.post.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-repair-patch
          path: ${{ runner.temp }}/selfheal-repair.patch
          if-no-files-found: error

  create-repair-pr:
    needs: self-heal
    if: needs.self-heal.result == 'success'
    permissions:
      contents: write
      pull-requests: write
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.self-heal.outputs.target-branch }}

      - name: Download repair patch
        uses: actions/download-artifact@v4
        with:
          name: selfheal-repair-patch
          path: ${{ runner.temp }}/selfheal-repair-patch

      - name: Apply repair patch
        run: |
          set -euxo pipefail
          git apply "${{ runner.temp }}/selfheal-repair-patch/selfheal-repair.patch"

      - name: Create PR with fixes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto-fix lint/format and lockfiles"
          title: "🔧 Auto-healing fixes"
          body: |
            Automated fixes generated by the self-heal workflow.
            Please review the attached logs for details.
          labels: self-heal
          branch: auto-heal/fixes-${{ github.run_id }}-${{ github.run_attempt }}
          base: ${{ needs.self-heal.outputs.target-branch }}
