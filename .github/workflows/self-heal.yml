name: Self-heal (auto-fix & PR)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  self-heal:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure')
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e .
          pip install pytest black

      - name: Run healthcheck (pre-repair)
        continue-on-error: true
        run: python scripts/healthcheck.py > selfheal-pre.txt 2>&1

      - name: Attempt self-heal repairs
        run: python scripts/self-heal.py > selfheal-repair.txt 2>&1

      - name: Run healthcheck (post-repair)
        id: post
        continue-on-error: true
        run: python scripts/healthcheck.py > selfheal-post.txt 2>&1

      - name: Collect logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-logs
          path: |
            selfheal-pre.txt
            selfheal-repair.txt
            selfheal-post.txt

      - name: Create PR with fixes
        if: steps.post.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b self-heal-${{ github.run_id }}
          git add .
          git commit -m "[AI-Assisted] Auto-fix formatting and linting"
          git push origin self-heal-${{ github.run_id }}
          gh pr create --title "[AI-Assisted] Self-healing auto-fixes" --body "Automatically generated PR to fix formatting/linting issues detected in CI." --label "self-heal" --base main --head self-heal-${{ github.run_id }}
