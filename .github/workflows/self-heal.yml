name: Self-heal (auto-fix & PR)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  self-heal:
    # Never execute pull-request code from a fork in this privileged workflow_run
    # context. The repair scripts run with contents/pull-requests write permissions,
    # so only same-repository failures are eligible for automatic repair.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout failing revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # For workflow_run failures, repair only same-repository commits that
          # failed CI. Manual runs keep the current workflow ref. Forked pull
          # request failures are skipped by the job-level guard above.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Use Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e .
          pip install pytest black

      - name: Run healthcheck (pre-repair)
        continue-on-error: true
        run: python scripts/healthcheck.py | tee selfheal-pre.txt

      - name: Attempt self-heal repairs
        run: python scripts/self-heal.py | tee selfheal-repair.txt

      - name: Run healthcheck (post-repair)
        id: post
        continue-on-error: true
        run: python scripts/healthcheck.py | tee selfheal-post.txt

      - name: Collect logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-logs
          path: |
            selfheal-pre.txt
            selfheal-repair.txt
            selfheal-post.txt

      - name: Create PR with fixes
        if: steps.post.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b self-heal-fixes-${{ github.run_id }}
          git add -A -- . ':(exclude)selfheal-*.txt'
          if git diff --staged --quiet; then
            echo "No changes to commit. Exiting."
            exit 0
          fi
          repair_branch="self-heal-fixes-${{ github.run_id }}"
          git commit -m "Auto-fix format/lint/type errors"
          git push origin "$repair_branch"
          gh pr create --title "Auto-fix format/lint/type errors" --body "Automated fixes generated by self-heal workflow. Logs attached to workflow run. A validation run is dispatched for this repair branch because PRs created by GITHUB_TOKEN do not trigger push/pull_request workflows." --base main --head "$repair_branch" --label "self-heal"
          gh workflow run ci.yml --ref "$repair_branch"
