name: Self-heal (auto-fix & PR)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  self-heal:
    # Never execute pull-request code from a fork in this privileged workflow_run
    # context. The repair scripts run only for same-repository failures and with
    # read-only permissions; a later job with write permissions only applies the
    # generated patch and opens the PR.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      actions: read
    outputs:
      has_changes: ${{ steps.patch.outputs.has_changes }}
    steps:
      - name: Checkout failing revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          # For workflow_run failures, repair only same-repository commits that
          # failed CI. Manual runs keep the current workflow ref. Forked pull
          # request failures are skipped by the job-level guard above.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Use Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e .
          pip install pytest black

      - name: Run healthcheck (pre-repair)
        continue-on-error: true
        run: python scripts/healthcheck.py | tee selfheal-pre.txt

      - name: Attempt self-heal repairs
        run: python scripts/self-heal.py | tee selfheal-repair.txt

      - name: Run healthcheck (post-repair)
        id: post
        continue-on-error: true
        run: python scripts/healthcheck.py | tee selfheal-post.txt

      - name: Collect logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-logs
          path: |
            selfheal-pre.txt
            selfheal-repair.txt
            selfheal-post.txt

      - name: Prepare repair patch
        id: patch
        if: steps.post.outcome == 'success'
        run: |
          git add -A -- . ':(exclude)selfheal-*.txt'
          if git diff --staged --quiet; then
            echo "No changes to commit. Exiting."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --staged --binary > selfheal.patch
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Upload repair patch
        if: steps.patch.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: selfheal-patch
          path: selfheal.patch

  create-pr:
    needs: self-heal
    if: needs.self-heal.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repaired revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Download repair patch
        uses: actions/download-artifact@v4
        with:
          name: selfheal-patch

      - name: Create PR with fixes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b self-heal-fixes-${{ github.run_id }}
          git apply --index selfheal.patch
          git commit -m "Auto-fix format/lint/type errors"
          git push origin self-heal-fixes-${{ github.run_id }}
          gh pr create --title "Auto-fix format/lint/type errors" --body "Automated fixes generated by self-heal workflow. Logs attached to workflow run." --base main --head self-heal-fixes-${{ github.run_id }} --label "self-heal"
